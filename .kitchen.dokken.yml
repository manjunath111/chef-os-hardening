# this file is used for kitchen dokken
# especially for integration tests in the CI
---
driver:
  name: dokken
  privileged: true # because Docker and systemd
  chef_image: cincproject/cinc
  chef_version: <%= ENV['CINC_VERSION'] || 'latest' %>

provisioner:
  name: dokken
  product_name: cinc
  chef_binary: /opt/cinc/bin/cinc-client

transport:
  name: dokken

platforms:
- name: ubuntu-20-04
  driver:
    image: dokken/ubuntu-20.04
    pid_one_command: /bin/systemd
    intermediate_instructions:
      - RUN /usr/bin/apt-get update
- name: ubuntu-22-04
  driver:
    image: dokken/ubuntu-22.04
    pid_one_command: /bin/systemd
    intermediate_instructions:
      - RUN /usr/bin/apt-get update
- name: ubuntu-24-04
  driver:
    image: dokken/ubuntu-24.04
    pid_one_command: /bin/systemd
    intermediate_instructions:
      - RUN /usr/bin/apt-get update
- name: ubuntu-26-04
  driver:
    image: dokken/ubuntu-26.04
    pid_one_command: /usr/lib/systemd/systemd
    intermediate_instructions:
      - RUN /usr/bin/apt-get update

- name: centos-stream-9
  driver:
    image: dokken/centos-stream-9
    pid_one_command: /usr/lib/systemd/systemd
- name: centos-stream-10
  driver:
    image: dokken/centos-stream-10
    pid_one_command: /usr/lib/systemd/systemd

- name: almalinux-8
  driver:
    image: dokken/almalinux-8
    pid_one_command: /usr/lib/systemd/systemd
- name: almalinux-9
  driver:
    image: dokken/almalinux-9
    pid_one_command: /usr/lib/systemd/systemd
- name: almalinux-10
  driver:
    image: dokken/almalinux-10
    pid_one_command: /usr/lib/systemd/systemd

- name: rockylinux-8
  driver:
    image: dokken/rockylinux-8
    pid_one_command: /usr/lib/systemd/systemd
- name: rockylinux-9
  driver:
    image: dokken/rockylinux-9
    pid_one_command: /usr/lib/systemd/systemd
- name: rockylinux-10
  driver:
    image: dokken/rockylinux-10
    pid_one_command: /usr/lib/systemd/systemd

- name: oracle-8
  driver:
    image: dokken/oraclelinux-8
    pid_one_command: /usr/lib/systemd/systemd
- name: oracle-9
  driver:
    image: dokken/oraclelinux-9
    pid_one_command: /usr/lib/systemd/systemd
- name: oracle-10
  driver:
    image: dokken/oraclelinux-10
    pid_one_command: /usr/lib/systemd/systemd

- name: debian-13
  driver:
    image: dokken/debian-13
    intermediate_instructions:
    - RUN /usr/bin/apt-get update
    pid_one_command: /usr/lib/systemd/systemd

- name: fedora-43
  driver:
    image: dokken/fedora-43
    pid_one_command: /usr/lib/systemd/systemd
    intermediate_instructions:
    - RUN dnf install -y yum
